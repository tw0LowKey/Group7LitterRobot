# ---------------------------------------------------------
# Clock (Crucial for use_sim_time: true)
# ---------------------------------------------------------
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

# ---------------------------------------------------------
# Diff Drive: Velocity Commands
# ---------------------------------------------------------
- ros_topic_name: "/scout_2/cmd_vel"
  gz_topic_name: "/scout_2/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

# ---------------------------------------------------------
# Diff Drive: Odometry
# ---------------------------------------------------------
- ros_topic_name: "/scout_2/odom"
  gz_topic_name: "/scout_2/odom"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

# Diff drive often publishes its TF (odom -> base_footprint) here
- ros_topic_name: "/tf"
  gz_topic_name: "/model/scout_2/tf"
  ros_type_name: "tf2_msgs/msg/TFMessage"
  gz_type_name: "gz.msgs.Pose_V"
  direction: GZ_TO_ROS

# ---------------------------------------------------------
# IMU
# ---------------------------------------------------------
- ros_topic_name: "/scout_2/imu"
  gz_topic_name: "/scout_2/imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS

# ---------------------------------------------------------
# Joint States 
# ---------------------------------------------------------
- ros_topic_name: "/joint_states"
  gz_topic_name: "/world/empty/model/scout_2/joint_state"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS

# ---------------------------------------------------------
# Lidar 
# ---------------------------------------------------------
# 3D Lidar Pointcloud
- ros_topic_name: "/points"
  gz_topic_name: "/points"
  ros_type_name: "sensor_msgs/msg/PointCloud2"
  gz_type_name: "gz.msgs.PointCloudPacked"
  direction: GZ_TO_ROS

# 2D Lidar Scan (if lidar_type == '2d')
- ros_topic_name: "/scan"
  gz_topic_name: "/scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS
