amcl:
    ros__parameters:
        alpha1: 0.2
        alpha2: 0.2
        alpha3: 0.2
        alpha4: 0.2
        alpha5: 0.2
        base_frame_id: mobile_robot_base_link
        beam_skip_distance: 0.5
        beam_skip_error_threshold: 0.9
        beam_skip_threshold: 0.3
        do_beamskip: false
        global_frame_id: map
        lambda_short: 0.1
        laser_likelihood_max_dist: 2.0
        laser_max_range: 100.0
        laser_min_range: -1.0
        laser_model_type: "likelihood_field"
        max_beams: 60
        max_particles: 2000
        min_particles: 500
        odom_frame_id: odom
        pf_err: 0.05
        pf_z: 0.99
        recovery_alpha_fast: 0.0
        recovery_alpha_slow: 0.0
        resample_interval: 1
        robot_model_type: "nav2_amcl::DifferentialMotionModel"
        save_pose_rate: 0.5
        sigma_hit: 0.2
        tf_broadcast: true
        transform_tolerance: 1.0
        update_min_a: 0.2
        update_min_d: 0.25
        z_hit: 0.5
        z_max: 0.05
        z_rand: 0.5
        z_short: 0.05
        scan_topic: /laser_scan
        map_topic: /map
        set_initial_pose: true
        initial_pose:
            x: 0.0
            y: 0.0
            z: 0.25
            yaw: 0.0


controller_server:
    ros__parameters:
        controller_frequency: 20.0
        min_x_velocity_threshold: 0.001
        min_y_velocity_threshold: 0.5
        min_theta_velocity_threshold: 0.001
        failure_tolerance: 0.3
        progress_checker_plugins: ["progress_checker"]
        goal_checker_plugins: ["goal_checker"]
        controller_plugins: ["FollowPath"]
        use_realtime_priority: false
        odom_topic: /odometry
        progress_checker:
            plugin: "nav2_controller::SimpleProgressChecker"
            required_movement_radius: 0.5
            movement_time_allowance: 10.0
        goal_checker:
            stateful: True
            plugin: "nav2_controller::SimpleGoalChecker"
            xy_goal_tolerance: 0.5
            yaw_goal_tolerance: 2.0
        FollowPath:
            plugin: "nav2_rotation_shim_controller::RotationShimController"
            primary_controller: "nav2_mppi_controller::MPPIController"
            angular_dist_threshold: 0.2
            forward_sampling_distance: 0.5
            rotate_to_heading_angular_vel: 2.3
            max_angular_accel: 2.5
            simulate_ahead_time: 3.0
            time_steps: 200
            model_dt: 0.05
            batch_size: 1000
            vx_std: 0.2
            vy_std: 0.2
            wz_std: 0.4
            vx_max: 1.0
            vx_min: -0.5
            vy_max: 0.5
            wz_max: 2.0
            iteration_count: 1
            temperature: 0.3
            gamma: 0.013
            visualize: False
            retry_attempt_limit: 1
            regenerate_noises: false
            TrajectoryVisualizer:
                trajectory_step: 20
                time_step: 5
            transform_tolerance: 0.1
            prune_distance: 1.5
            enforce_path_inversion: true
            inversion_xy_tolerance: 0.2
            inversion_yaw_tolerance: 0.4
            BaseObstacle.scale: 0.02
            PathAlign.scale: 32.0
            PathAlign.forward_point_distance: 0.1
            GoalAlign.scale: 24.0
            GoalAlign.forward_point_distance: 0.1
            PathDist.scale: 32.0
            GoalDist.scale: 24.0
            RotateToGoal.scale: 32.0
            RotateToGoal.slowing_factor: 5.0
            RotateToGoal.lookahead_time: -1.0
            motion_model: "Ackermann"
            AckermannConstraints:
                min_turning_r: 0.2
            critics: ["ConstraintCritic", "ObstaclesCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
            ConstraintCritic:
                enabled: true
                cost_power: 1
                cost_weight: 4.0
            GoalCritic:
                enabled: true
                cost_power: 1
                cost_weight: 5.0
                threshold_to_consider: 1.4
            GoalAngleCritic:
                enabled: true
                cost_power: 1
                cost_weight: 3.0
                threshold_to_consider: 0.5
            PreferForwardCritic:
                enabled: true
                cost_power: 1
                cost_weight: 10.0
                threshold_to_consider: 0.5
            ObstaclesCritic:
                enabled: true
                cost_power: 1
                repulsion_weight: 1.0
                critical_weight: 10.0
                consider_footprint: true
                collision_cost: 1000.0
                collision_margin_distance: 0.2
                near_goal_distance: 0.5
            PathAlignCritic:
                enabled: true
                cost_power: 1
                cost_weight: 20.0
                max_path_occupancy_ratio: 0.05
                trajectory_point_step: 3
                threshold_to_consider: 1.0
                offset_from_furthest: 30
                use_path_orientations: true
            PathFollowCritic:
                enabled: true
                cost_power: 1
                cost_weight: 2.0
                offset_from_furthest: 6
                threshold_to_consider: 1.4
            PathAngleCritic:
                enabled: true
                cost_power: 1
                cost_weight: 4.0
                offset_from_furthest: 4
                threshold_to_consider: 0.5
                max_angle_to_furthest: 0.7
                mode: 2
            TwirlingCritic:
                enabled: true
                twirling_cost_power: 1
                twirling_cost_weight: 10.0

            
local_costmap:
    local_costmap:
        ros__parameters:
            update_frequency: 10.0
            publish_frequency: 5.0
            global_frame: odom
            robot_base_frame: mobile_robot_base_link
            map_topic: /map
            use_sim_time: True
            rolling_window: true
            width: 5
            height: 5
            resolution: 0.05
            footprint: "[ [0.45, 0.35], [0.45, -0.35], [-0.45, -0.35], [-0.45, 0.35] ]"
            footprint_padding: 0.02
            lethal_cost_threshold: 100
            track_unknown_space: true
            plugins: ["obstacle_layer", "inflation_layer"]
            inflation_layer:
                plugin: "nav2_costmap_2d::InflationLayer"
                cost_scaling_factor: 10.0  # Higher = costs drop off faster (less fear of being near walls)
                inflation_radius: 0.35     # Lower = smaller safety bubble around obstacles
            obstacle_layer:
                plugin: "nav2_costmap_2d::ObstacleLayer"
                enabled: True
                observation_sources: scan
                scan:
                    topic: /laser_scan
                    min_obstacle_height: 0.1
                    max_obstacle_height: 2.0
                    clearing: True
                    marking: True
                    data_type: "LaserScan"
                    raytrace_max_range: 15.0
                    raytrace_min_range: 0.0
                    obstacle_max_range: 12.0
                    obstacle_min_range: 0.0
            always_send_full_costmap: True


global_costmap:
    global_costmap:
        ros__parameters:
            update_frequency: 2.0
            publish_frequency: 2.0
            global_frame: odom   # <--- CHANGE THIS (was map)
            robot_base_frame: mobile_robot_base_link
            # map_topic: /map    # <--- COMMENT OUT or REMOVE
            rolling_window: true
            footprint: "[ [0.45, 0.35], [0.45, -0.35], [-0.45, -0.35], [-0.45, 0.35] ]"
            footprint_padding: 0.02
            resolution: 0.05
            width: 12
            height: 12
            track_unknown_space: true
            lethal_cost_threshold: 100
            
            # CHANGE BELOW: Remove "static_layer" from this list
            plugins: ["obstacle_layer", "inflation_layer"] 

            # DELETE the entire "static_layer:" block that was here

            obstacle_layer:
                plugin: "nav2_costmap_2d::ObstacleLayer"
                enabled: True
                observation_sources: scan
                scan:
                    topic: /laser_scan
                    max_obstacle_height: 2.0
                    clearing: True
                    marking: True
                    data_type: "LaserScan"
                    raytrace_max_range: 15.0
                    raytrace_min_range: 0.0
                    obstacle_max_range: 12.0
                    obstacle_min_range: 0.0
            inflation_layer:
                plugin: "nav2_costmap_2d::InflationLayer"
                cost_scaling_factor: 3.0
                inflation_radius: 0.55
            always_send_full_costmap: True
map_server:
    ros__parameters:
        use_sim_time: True
        topic_name: /map
        frame_id: map

map_saver:
    ros__parameters:
        use_sim_time: True
        save_map_timeout: 5000.0
        free_thresh_default: 0.25
        occupied_thresh_default: 0.65
        map_subscribe_transient_local: False

planner_server:
    ros__parameters:
        expected_planner_frequency: 20.0
        planner_plugins: ["GridBased"]
        GridBased:
            plugin: "nav2_smac_planner/SmacPlannerHybrid"
            downsample_costmap: false
            downsampling_factor: 1
            tolerance: 0.25
            allow_unknown: true
            max_iterations: 1000000
            max_on_approach_iterations: 1000
            max_planning_time: 10.0
            motion_model_for_search: "DUBIN"
            angle_quantization_bins: 64
            analytic_expansion_ratio: 3.5
            analytic_expansion_max_length: 3.0
            minimum_turning_radius: 0.2
            reverse_penalty: 2.0
            change_penalty: 0.0
            non_straight_penalty: 1.2
            cost_penalty: 2.0
            retrospective_penalty: 0.015
            lookup_table_size: 20.0
            cache_obstacle_heuristic: false
            debug_visualizations: false
            use_quadratic_cost_penalty: False
            downsample_obstacle_heuristic: True
            allow_primitive_interpolation: False
            smooth_path: True
            smoother:
                max_iterations: 100
                w_smooth: 0.3
                w_data: 0.2
                tolerance: 1.0e-10
                do_refinement: true
                refinement_num: 2

smoother_server:
    ros__parameters:
        robot_base_frame: mobile_robot_base_link
        footprint_topic: “global_costmap/published_footprint”
        costmap_topic: “global_costmap/costmap_raw”
        smoother_plugins: ["ConstrainedSmootherPlugin"]
        ConstrainedSmootherPlugin:
            plugin: "nav2_constrained_smoother/ConstrainedSmoother"
            reversing_enabled: true
            path_downsampling_factor: 3
            path_upsampling_factor: 1
            keep_start_orientation: true
            keep_goal_orientation: true
            minimum_turning_radius: 0.0
            w_curve: 30.0
            w_dist: 0.0
            w_smooth: 200.0
            w_cost: 500.0
            w_cost_cusp_multiplier: 3.0
            cusp_zone_length: 2.5
            optimizer:
                linear_solver_type: SPARSE_NORMAL_CHOLESKY
                max_iterations: 70
                debug_optimizer: false

behavior_server:
    ros__parameters:
        local_costmap_topic: local_costmap/costmap_raw
        global_costmap_topic: global_costmap/costmap_raw
        local_footprint_topic: local_costmap/published_footprint
        global_footprint_topic: global_costmap/published_footprint
        cycle_frequency: 10.0
        behavior_plugins:
            ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
        spin:
            plugin: "nav2_behaviors/Spin"
        backup:
            plugin: "nav2_behaviors/BackUp"
        drive_on_heading:
            plugin: "nav2_behaviors/DriveOnHeading"
        wait:
            plugin: "nav2_behaviors/Wait"
        assisted_teleop:
            plugin: "nav2_behaviors/AssistedTeleop"
        local_frame: odom
        global_frame: map
        robot_base_frame: mobile_robot_base_link
        transform_tolerance: 0.1
        simulate_ahead_time: 2.0
        max_rotational_vel: 0.8
        min_rotational_vel: 0.2
        rotational_acc_lim: 2.0

waypoint_follower:
    ros__parameters:
        loop_rate: 20
        stop_on_failure: false
        action_server_result_timeout: 900.0
        waypoint_task_executor_plugin: "wait_at_waypoint"
        wait_at_waypoint:
            plugin: "nav2_waypoint_follower::WaitAtWaypoint"
            enabled: True
            waypoint_pause_duration: 200

velocity_smoother:
    ros__parameters:
        smoothing_frequency: 20.0
        scale_velocities: False
        feedback: "OPEN_LOOP"
        # INCREASED: Max linear speed (x) and angular speed (theta/z)
        max_velocity: [1.0, 0.0, 3.0] 
        min_velocity: [-0.5, 0.0, -3.0]
        # INCREASED: Acceleration - higher values make it "snappier"
        max_accel: [5.0, 0.0, 4.0]
        max_decel: [-5.0, 0.0, -4.0]
        odom_topic: /odometry
        odom_duration: 0.1
        deadband_velocity: [0.0, 0.0, 0.0]
        velocity_timeout: 1.0

slam_toolbox:
    ros__parameters:
        solver_plugin: solver_plugins::CeresSolver
        ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
        ceres_preconditioner: SCHUR_JACOBI
        ceres_trust_strategy: LEVENBERG_MARQUARDT
        ceres_dogleg_type: TRADITIONAL_DOGLEG
        ceres_loss_function: CauchyLoss
        odom_frame: odom
        map_frame: map
        base_frame: base_footprint # --> base_footprint
        scan_topic: /laser_scan # --> /scan
        use_map_saver: true
        mode: mapping
        debug_logging: false
        throttle_scans: 1
        transform_publish_period: 0.02
        map_update_interval: 5.0
        resolution: 0.05
        max_laser_range: 16.0
        minimum_time_interval: 0.5
        transform_timeout: 0.2
        tf_buffer_duration: 30.
        stack_size_to_use: 40000000
        enable_interactive_mode: true
        use_scan_matching: true
        use_scan_barycenter: true
        minimum_travel_distance: 0.5
        minimum_travel_heading: 0.5
        scan_buffer_size: 10
        scan_buffer_maximum_scan_distance: 10.0
        link_match_minimum_response_fine: 0.1
        link_scan_maximum_distance: 1.5
        loop_search_maximum_distance: 3.0
        do_loop_closing: true
        loop_match_minimum_chain_size: 10
        loop_match_maximum_variance_coarse: 3.0
        loop_match_minimum_response_coarse: 0.35
        loop_match_minimum_response_fine: 0.45
        correlation_search_space_dimension: 0.5
        correlation_search_space_resolution: 0.01
        correlation_search_space_smear_deviation: 0.1
        loop_search_space_dimension: 8.0
        loop_search_space_resolution: 0.05
        loop_search_space_smear_deviation: 0.03
        distance_variance_penalty: 0.5
        angle_variance_penalty: 1.0
        fine_search_angle_offset: 0.00349
        coarse_search_angle_offset: 0.349
        coarse_angle_resolution: 0.0349
        minimum_angle_penalty: 0.9
        minimum_distance_penalty: 0.5
        use_response_expansion: true

planner_server_rclcpp_node:
    ros__parameters:
        use_sim_time: True

robot_state_publisher:
    ros__parameters:
        use_sim_time: True