---
# ----------------------------------------
# Velocity Command (ROS 2 -> Gazebo)
# ----------------------------------------
- ros_topic_name: "/cmd_vel_follower"
  gz_topic_name: "/cmd_vel_follower"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "ignition.msgs.Twist"
  direction: ROS_TO_GZ

# ----------------------------------------
# Odometry (Gazebo -> ROS 2)
# ----------------------------------------
- ros_topic_name: "/follower/odom"
  gz_topic_name: "/follower/odom"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "ignition.msgs.Odometry"
  direction: GZ_TO_ROS

# ----------------------------------------
# Transforms (Gazebo -> ROS 2)
# ----------------------------------------
- ros_topic_name: "/follower/tf"
  gz_topic_name: "/follower/tf"
  ros_type_name: "tf2_msgs/msg/TFMessage"
  gz_type_name: "ignition.msgs.Pose_V"
  direction: GZ_TO_ROS

# ----------------------------------------
# IMU Sensor (Gazebo -> ROS 2)
# ----------------------------------------
- ros_topic_name: "/follower/imu"
  gz_topic_name: "/follower/imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "ignition.msgs.IMU"
  direction: GZ_TO_ROS

# ----------------------------------------
# 2D Lidar / Scan (Gazebo -> ROS 2)
# ----------------------------------------
- ros_topic_name: "/follower/scan"
  gz_topic_name: "/follower/scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "ignition.msgs.LaserScan"
  direction: GZ_TO_ROS

# ----------------------------------------
# 3D Lidar / Pointcloud (Gazebo -> ROS 2)
# ----------------------------------------
- ros_topic_name: "/follower/pointcloud"
  gz_topic_name: "/follower/pointcloud"
  ros_type_name: "sensor_msgs/msg/PointCloud2"
  gz_type_name: "ignition.msgs.PointCloudPacked"
  direction: GZ_TO_ROS

# ----------------------------------------
# Clock (Gazebo -> ROS 2)
# (Included just in case the follower needs its own clock bridge sync)
# ----------------------------------------
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "ignition.msgs.Clock"
  direction: GZ_TO_ROS