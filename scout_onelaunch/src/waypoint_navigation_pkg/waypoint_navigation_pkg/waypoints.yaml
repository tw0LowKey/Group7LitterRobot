waypoints:
  # Forward 4m
  - pose:
      position: {x: 0.5, y: 0.0, z: 0.0}
      orientation: {x: 0.0, y: 0.0, z: 0.0, w: 1.0}
  - pose:
      position: {x: 1.0, y: 0.0, z: 0.0}
      orientation: {x: 0.0, y: 0.0, z: 0.0, w: 1.0}
  - pose:
      position: {x: 1.5, y: 0.0, z: 0.0}
      orientation: {x: 0.0, y: 0.0, z: 0.0, w: 1.0}
  - pose:
      position: {x: 2.0, y: 0.0, z: 0.0}
      orientation: {x: 0.0, y: 0.0, z: 0.0, w: 1.0}
  - pose:
      position: {x: 2.5, y: 0.0, z: 0.0}
      orientation: {x: 0.0, y: 0.0, z: 0.0, w: 1.0}
  - pose:
      position: {x: 3.0, y: 0.0, z: 0.0}
      orientation: {x: 0.0, y: 0.0, z: 0.0, w: 1.0}
  - pose:
      position: {x: 3.5, y: 0.0, z: 0.0}
      orientation: {x: 0.0, y: 0.0, z: 0.0, w: 1.0}
  - pose:
      position: {x: 4.0, y: 0.0, z: 0.0}
      orientation: {x: 0.0, y: 0.0, z: 0.0, w: 1.0}

  # Move left 0.85m
  - pose:
      position: {x: 4.0, y: 0.85, z: 0.0}
      orientation: {x: 0.0, y: 0.0, z: 1.0, w: 0.0}

  # Return while facing backwards, so robot drives forward along -x
  - pose:
      position: {x: 3.5, y: 0.85, z: 0.0}
      orientation: {x: 0.0, y: 0.0, z: 1.0, w: 0.0}
  - pose:
      position: {x: 3.0, y: 0.85, z: 0.0}
      orientation: {x: 0.0, y: 0.0, z: 1.0, w: 0.0}
  - pose:
      position: {x: 2.5, y: 0.85, z: 0.0}
      orientation: {x: 0.0, y: 0.0, z: 1.0, w: 0.0}
  - pose:
      position: {x: 2.0, y: 0.85, z: 0.0}
      orientation: {x: 0.0, y: 0.0, z: 1.0, w: 0.0}
  - pose:
      position: {x: 1.5, y: 0.85, z: 0.0}
      orientation: {x: 0.0, y: 0.0, z: 1.0, w: 0.0}
  - pose:
      position: {x: 1.0, y: 0.85, z: 0.0}
      orientation: {x: 0.0, y: 0.0, z: 1.0, w: 0.0}
  - pose:
      position: {x: 0.5, y: 0.85, z: 0.0}
      orientation: {x: 0.0, y: 0.0, z: 1.0, w: 0.0}
  - pose:
      position: {x: 0.0, y: 0.85, z: 0.0}
      orientation: {x: 0.0, y: 0.0, z: 1.0, w: 0.0}